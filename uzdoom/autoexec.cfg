alias fastsave "save quick"
alias fastload "load quick"

// --- VISUALS (The Nightdive "Software-Plus" Look) ---
gl_lightmode 0             // Sector Light Mode: Software
gl_bandedsw 1              // Enables light "banding/stepping" 
gl_tonemap 3               // Forces 256-color Palette look
gl_texture_filter 0        // Sharp pixels (Nearest Neighbor)
gl_texture_filter_aniso 16 // Sharp floors at a distance
gl_brightmap 0             // Classic flat texture lighting
gl_particles_style 0       // Classic square particles 
gl_fuzztype 0              // Set Fuzz Type to Shadow (equivalent to RenderStyle Shadow)

// --- HUD & UI (Remaster Minimalist) ---
vid_aspect 1               // Forces 16:9 widescreen
screenblocks 11            // Removes the big brick status bar
hud_althud 1               // Enables the modern minimalist HUD
hud_althud_scale 1         // Scales HUD for high resolutions
hud_showstats 0            // Keeps the screen clean (no extra stats)
hud_showweapons 1          // Shows weapon icons like the Remaster
st_scale 1                 // Scales status bar elements correctly

// --- CROSSHAIR --
crosshair 2                // The classic "Cross" style
crosshairon 1              // Enable the Crosshair
crosshairscale 0.2         // Small, modern crosshair size
crosshairgrow 0            // Grows when picking up an item 
crosshairhealth 0          // This will make the Crosshair change color based off player health
crosshaircolor "00 FF 00"  // This Hex code represents the classic Nightdive Remaster Green

// --- GAMEPLAY & POLISH ---
cl_run 1                   // Always Run enabled
cl_infight 1               // Ensures monsters fight each other as intended

// --- PERFORMANCE ---
vid_fps 1                  // Shows the FPS counter in the corner
vid_fps_pos 2              // Moves the counter to the TOP LEFT corner
vid_maxfps 60              // Limits frames to 60 to match your 1920x1200 monitor
cl_capfps 0                // Keep at 0 to allow the engine to hit the 60 cap smoothly

// --- LEGACY OF RUST & ID24 SUPPORT ---
sv_minpitch -90            // Full vertical look
sv_maxpitch 90

// --- AUDIO ---
snd_samplerate 48000       // Sets high-definition audio quality (48kHz)
snd_mididevice -5          // Sets the MIDI Device to FluidSynth 

// --- FUNCTION & UTILITY KEYS ---
bind "F5" "fastsave"
bind "F6" "menu_display"   // Opens the Options menu directly
bind "F9" "fastload"

// --- ACTION CONTROLS ---
bind "p" "+attack"         // Shoot / Fire (Same as Left Click)
bind ";" "+altattack"      // Alt Fire / Zoom (Same as Right Click)
bind "ctrl" "+crouch"      // Hold Left Ctrl to crouch

// --- CAMERA CONTROLS ---
bind "l" "+left"           // Turn Left
bind "'" "+right"          // Turn Right
bind "c" "centerview"      // Instantly snaps view to the horizon
bind "x" "turn180"         // Instantly face behind you
use_mouse 1                // Disable mouse look
///////////////////////////////////////////////////////////////////////////////
// DPI  Sensitivity
// 200	0
// 400	0.15
// 600	0.3
// 800	0.45
// 1000	0.6
// 1200	0.75
// 1400	0.9
// 1600	1.05
///////////////////////////////////////////////////////////////////////////////
m_sensitivity_x 0.6        // Horizontal sensitivity.
m_sensitivity_y 0.6        // Vertical sensitivity.

// --- WEAPON BINDS ---
bind "mouse5" "slot 1"     // Fists / Chainsaw
bind "f" "slot 1"          // Fists / Chainsaw
bind "1" "slot 3"          // Shotgun / Super Shotgun
bind "5" "slot 3"          // Shotgun / Super Shotgun
bind "2" "slot 2"          // Pistol
bind "z" "slot 4"          // Chaingun
bind "4" "slot 5"          // Rocket Launcher
bind "3" "slot 6"          // Plasma Rifle
bind "t" "slot 7"          // BFG9000
